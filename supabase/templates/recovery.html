<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Redefina sua senha</title>
  </head>
  <body style="margin:0;padding:0;background-color:#f4f4f5;font-family:Arial,Helvetica,sans-serif;color:#18181b;">
    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background-color:#f4f4f5;padding:24px 12px;">
      <tr>
        <td align="center">
          <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="max-width:600px;background-color:#ffffff;border-radius:20px;overflow:hidden;">
            <tr>
              <td style="padding:32px 32px 16px;background:linear-gradient(135deg,#7c2d12,#ea580c);color:#ffffff;">
                <div style="font-size:12px;letter-spacing:0.16em;text-transform:uppercase;opacity:0.84;">PlanoCerto</div>
                <h1 style="margin:12px 0 0;font-size:28px;line-height:1.2;">Redefina sua senha</h1>
              </td>
            </tr>
            <tr>
              <td style="padding:32px;">
                <p style="margin:0 0 16px;font-size:16px;line-height:1.7;">Olá,</p>
                <p style="margin:0 0 24px;font-size:16px;line-height:1.7;">
                  Recebemos uma solicitação para redefinir a senha da conta
                  <strong>{{ .Email }}</strong>.
                </p>
                <p style="margin:0 0 28px;">
                  <a href="{{ .ConfirmationURL }}" style="display:inline-block;background-color:#ea580c;color:#ffffff;text-decoration:none;padding:14px 22px;border-radius:999px;font-weight:700;">
                    Criar nova senha
                  </a>
                </p>
                <p style="margin:0 0 12px;font-size:14px;line-height:1.7;color:#52525b;">
                  Se o botão não funcionar, abra este link:
                </p>
                <p style="margin:0 0 24px;font-size:14px;line-height:1.7;word-break:break-all;color:#18181b;">
                  <a href="{{ .ConfirmationURL }}" style="color:#ea580c;">{{ .ConfirmationURL }}</a>
                </p>
                <p style="margin:0;font-size:14px;line-height:1.7;color:#52525b;">
                  Se você não solicitou a troca, ignore este email e sua senha atual continuará válida.
                </p>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
