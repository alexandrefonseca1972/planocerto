<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Código de verificação</title>
  </head>
  <body style="margin:0;padding:0;background-color:#f4f4f5;font-family:Arial,Helvetica,sans-serif;color:#18181b;">
    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background-color:#f4f4f5;padding:24px 12px;">
      <tr>
        <td align="center">
          <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="max-width:600px;background-color:#ffffff;border-radius:20px;overflow:hidden;">
            <tr>
              <td style="padding:32px 32px 16px;background:linear-gradient(135deg,#111827,#374151);color:#ffffff;">
                <div style="font-size:12px;letter-spacing:0.16em;text-transform:uppercase;opacity:0.84;">PlanoCerto</div>
                <h1 style="margin:12px 0 0;font-size:28px;line-height:1.2;">Código de verificação</h1>
              </td>
            </tr>
            <tr>
              <td style="padding:32px;">
                <p style="margin:0 0 16px;font-size:16px;line-height:1.7;">Olá,</p>
                <p style="margin:0 0 24px;font-size:16px;line-height:1.7;">
                  Para concluir esta ação sensível no <strong>PlanoCerto</strong>, use o código abaixo:
                </p>
                <div style="margin:0 0 24px;padding:18px 20px;border-radius:16px;background-color:#f4f4f5;border:1px solid #e4e4e7;text-align:center;font-size:30px;letter-spacing:0.22em;font-weight:700;">
                  {{ .Token }}
                </div>
                <p style="margin:0;font-size:14px;line-height:1.7;color:#52525b;">
                  Se você não iniciou esta operação, ignore este email.
                </p>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
